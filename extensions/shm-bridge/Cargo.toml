[package]
name = "aether-shm-bridge"
version.workspace = true
edition = "2024"
rust-version = "1.90"
description = "Transitional read-only bridge from the legacy Aether SHM data plane"
license.workspace = true
repository.workspace = true
documentation = "https://docs.rs/aether-shm-bridge"
readme = "README.md"
keywords = ["iot", "edge", "shared-memory", "gateway"]
