name: Docs Site Deploy

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "docs-site/**"
      - "AGENTS.md"
      - "ARCHITECTURE.md"
      - "crates/*/README.md"
      - "extensions/*/README.md"
      - ".github/workflows/docs-site-deploy.yml"

permissions:
  contents: read

concurrency:
  group: docs-site-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Type, content, and language check
        working-directory: docs-site
        run: npm run check

      - name: Unit tests
        working-directory: docs-site
        run: npm run test:coverage

      - name: Worker unit tests
        working-directory: docs-site
        run: npm run test:worker

      - name: Build dual-mode documentation
        working-directory: docs-site
        run: npm run build

      - name: Verify HTML and agent representations
        working-directory: docs-site
        shell: bash
        run: |
          test -f dist/index.html
          test -f dist/index.md
          test -f dist/llms.txt
          test -f dist/llms-full.txt
          if rg --pcre2 '\p{Han}|\p{Hiragana}|\p{Katakana}|\p{Hangul}' dist/*.md dist/*.txt dist/*/*.md; then
            echo "Published agent documentation must be English-only."
            exit 1
          fi

      - name: Detect Cloudflare deployment credentials
        id: cloudflare
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -n "$CLOUDFLARE_API_TOKEN" && -n "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare deployment skipped: repository secrets are not configured."
          fi

      - name: Deploy to Cloudflare Workers
        if: steps.cloudflare.outputs.enabled == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs-site
          command: deploy
