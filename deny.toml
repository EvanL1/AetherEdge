[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-unknown-linux-musl",
]
all-features = true

[advisories]
yanked = "deny"
unmaintained = "workspace"
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "Optional OPC UA is hard-limited to anonymous SecurityPolicy None sessions and never creates an RSA keypair; see docs/security/dependency-exceptions.md" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Local path dependencies are expected inside private workspace crates. This
# exception never permits wildcard versions from a registry.
allow-wildcard-paths = true
highlight = "all"
deny = []
skip = []
skip-tree = []

[licenses]
confidence-threshold = 0.8
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
exceptions = [
    # File-scoped weak-copyleft dependencies already used by the CLI, serial,
    # and optional OPC UA protocol stacks. Keep these exceptions narrow rather
    # than allowing MPL for every future dependency.
    { crate = "async-opcua", allow = ["MPL-2.0"] },
    { crate = "async-opcua-client", allow = ["MPL-2.0"] },
    { crate = "async-opcua-core", allow = ["MPL-2.0"] },
    { crate = "async-opcua-crypto", allow = ["MPL-2.0"] },
    { crate = "async-opcua-macros", allow = ["MPL-2.0"] },
    { crate = "async-opcua-nodes", allow = ["MPL-2.0"] },
    { crate = "async-opcua-types", allow = ["MPL-2.0"] },
    { crate = "colored", allow = ["MPL-2.0"] },
    { crate = "serialport", allow = ["MPL-2.0"] },
]
private = { ignore = true }

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "rev"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
